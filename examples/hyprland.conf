# Example keybindings for hypr-rectangle
# Add these to your ~/.config/hypr/hyprland.conf
#
# These match Rectangle.app "Alternate" defaults on macOS 1:1, with macOS
# modifiers translated as: ⌃ (Control) -> CTRL, ⌥ (Option) -> ALT,
# ⌘ (Command) -> SUPER, ⇧ (Shift) -> SHIFT, ⌫ (Delete/Backspace) -> BackSpace.

# =============================================================================
# HALVES  (Rectangle: ⌃⌥ + ←/→/↑/↓)
# =============================================================================

bind = CTRL ALT, Left,  exec, hypr-rectangle left
bind = CTRL ALT, Right, exec, hypr-rectangle right
bind = CTRL ALT, Up,    exec, hypr-rectangle up
bind = CTRL ALT, Down,  exec, hypr-rectangle down

# =============================================================================
# QUARTERS  (Rectangle: ⌃⌥ + U / I / J / K)
# =============================================================================

bind = CTRL ALT, U, exec, hypr-rectangle top-left
bind = CTRL ALT, I, exec, hypr-rectangle top-right
bind = CTRL ALT, J, exec, hypr-rectangle bottom-left
bind = CTRL ALT, K, exec, hypr-rectangle bottom-right

# =============================================================================
# THIRDS  (Rectangle: ⌃⌥ + D / F / G)
# =============================================================================

bind = CTRL ALT, D, exec, hypr-rectangle left-third
bind = CTRL ALT, F, exec, hypr-rectangle center-third
bind = CTRL ALT, G, exec, hypr-rectangle right-third

# =============================================================================
# TWO-THIRDS  (Rectangle: ⌃⌥ + E / T)
# =============================================================================

bind = CTRL ALT, E, exec, hypr-rectangle left-two-third
bind = CTRL ALT, T, exec, hypr-rectangle right-two-third

# =============================================================================
# MAXIMIZE, CENTER, RESTORE  (Rectangle: ⌃⌥ + Return / C / Delete)
# =============================================================================

bind = CTRL ALT, Return,    exec, hypr-rectangle maximize
bind = CTRL ALT, C,         exec, hypr-rectangle center
bind = CTRL ALT, BackSpace, exec, hypr-rectangle restore

# =============================================================================
# TARGET A SPECIFIC MONITOR (not a Rectangle feature — hypr-rectangle extra)
# =============================================================================
# Example: maximize active window on an external HDMI-A-1 monitor
# bind = CTRL ALT SHIFT, Return, exec, hypr-rectangle --monitor HDMI-A-1 maximize
