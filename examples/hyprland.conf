# Example keybindings for hypr-rectangle
# Add these to your ~/.config/hypr/hyprland.conf

# =============================================================================
# HALVES (Arrow keys)
# =============================================================================
# SUPER + CTRL + Arrow = snap to half

bind = SUPER CTRL, Left, exec, hypr-rectangle left
bind = SUPER CTRL, Right, exec, hypr-rectangle right
bind = SUPER CTRL, Up, exec, hypr-rectangle up
bind = SUPER CTRL, Down, exec, hypr-rectangle down

# Alternative: Vim-style keys (h/j/k/l)
# bind = SUPER CTRL, H, exec, hypr-rectangle left
# bind = SUPER CTRL, L, exec, hypr-rectangle right
# bind = SUPER CTRL, K, exec, hypr-rectangle up
# bind = SUPER CTRL, J, exec, hypr-rectangle down

# =============================================================================
# THIRDS (D/F/G keys - left to right on keyboard)
# =============================================================================
# SUPER + CTRL + D/F/G = snap to third

bind = SUPER CTRL, D, exec, hypr-rectangle left-third
bind = SUPER CTRL, F, exec, hypr-rectangle center-third
bind = SUPER CTRL, G, exec, hypr-rectangle right-third

# =============================================================================
# TWO-THIRDS (E/T keys)
# =============================================================================
# SUPER + CTRL + E/T = snap to two-thirds

bind = SUPER CTRL, E, exec, hypr-rectangle left-two-third
bind = SUPER CTRL, T, exec, hypr-rectangle right-two-third

# =============================================================================
# MAXIMIZE AND CENTER
# =============================================================================

# SUPER + CTRL + Enter = maximize (fill screen respecting gaps)
bind = SUPER CTRL, Return, exec, hypr-rectangle maximize

# SUPER + CTRL + C = center at 75% size
bind = SUPER CTRL, C, exec, hypr-rectangle center

# =============================================================================
# ALTERNATIVE LAYOUTS
# =============================================================================

# Rectangle-app style (Option/Alt + Ctrl)
# bind = ALT CTRL, Left, exec, hypr-rectangle left
# bind = ALT CTRL, Right, exec, hypr-rectangle right
# bind = ALT CTRL, Up, exec, hypr-rectangle up
# bind = ALT CTRL, Down, exec, hypr-rectangle down
# bind = ALT CTRL, Return, exec, hypr-rectangle maximize
# bind = ALT CTRL, C, exec, hypr-rectangle center

# Spectacle-style (Super + specific keys)
# bind = SUPER, KP_Left, exec, hypr-rectangle left      # Numpad 4
# bind = SUPER, KP_Right, exec, hypr-rectangle right    # Numpad 6
# bind = SUPER, KP_Up, exec, hypr-rectangle up          # Numpad 8
# bind = SUPER, KP_Down, exec, hypr-rectangle down      # Numpad 2
# bind = SUPER, KP_Begin, exec, hypr-rectangle center   # Numpad 5
